# Example configuration for OpenTherm Gateway
# Platform: ESP8266 (NodeMCU or similar)
# Author: Your Name
# Repository: https://github.com/sakrut/ESPHome-OpenTherm-Gateway

substitutions:
  device_name: opentherm_gateway
  friendly_name: OpenTherm Gateway

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "ESPHome OpenTherm Gateway for integrating with heating boilers"

esp8266:
  board: nodemcuv2

# Enable logging
logger:
  level: DEBUG
  logs:
    # Component logging levels:
    # - VERBOSE: All OpenTherm packets (Master<->Slave intercepts + Gateway<->Boiler fetches)
    #            Includes hex dumps, parsed values, cache operations
    # - DEBUG: All Home Assistant actions (sensor publishing, climate updates, temperature commands)
    # - INFO: Important events (startup, configuration, verified setpoints)
    # - WARN/ERROR: Problems and failures
    opentherm.component: VERBOSE  # Change to DEBUG for less verbose output

  # Optional: Remote syslog logging (for long-term debugging and metrics)
  # Uncomment and configure to send logs to a remote syslog server
  # logs:
  #   level: VERBOSE
  #   baud_rate: 0  # Disable serial logging to reduce overhead
  #
  # Remote syslog server configuration:
  # syslog:
  #   ip_address: 192.168.1.100  # Your syslog server IP
  #   port: 514                   # Standard syslog port
  #   strip_colors: true          # Remove color codes for clean log parsing

  # Alternative: MQTT-based logging (see mqtt section below)

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: "YOUR_OTA_PASSWORD"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "${device_name}_AP"
    password: "YOUR_AP_PASSWORD"

captive_portal:

# Optional: MQTT for remote logging and metrics
# Uncomment to enable MQTT-based logging and diagnostic publishing
# mqtt:
#   broker: !secret mqtt_broker  # e.g., 192.168.1.100
#   port: 1883
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   topic_prefix: esphome/${device_name}
#
#   # Optional: Publish logs to MQTT topic for remote collection
#   log_topic: ${device_name}/logs
#   log_topic_level: VERBOSE  # or DEBUG
#
#   # You can then subscribe to esphome/opentherm_gateway/logs
#   # and pipe to file or metrics system (Grafana Loki, ELK, etc.)

# External components setup
external_components:
  - source: github://sakrut/ESPHome-OpenTherm-Gateway
    components: [ opentherm ]
    refresh: 0d

# For local development/testing, use:
# external_components:
#   - source:
#       type: local
#       path: components
#     components: [ opentherm ]

# For testing specific branch (e.g., localtests):
# external_components:
#   - source: github://sakrut/ESPHome-OpenTherm-Gateway@localtests
#     components: [ opentherm ]
#     refresh: 0d

# Dashboard web UI
web_server:
  port: 80

# Empty platform declarations (required by ESPHome core)
# Real sensors are defined below in opentherm component
binary_sensor:
sensor:
climate:

# OpenTherm component configuration
opentherm:
  id: opentherm_gateway
  # Pin configuration (for ESP8266/NodeMCU)
  in_pin: 4      # D2 on NodeMCU
  out_pin: 5     # D1 on NodeMCU
  slave_in_pin: 12  # D6 on NodeMCU
  slave_out_pin: 13 # D7 on NodeMCU
  
  # Binary sensors
  flame:
    name: "${friendly_name} Flame"
    id: boiler_flame
    
  ch_active:
    name: "${friendly_name} Central Heating"
    id: ch_active
    
  dhw_active:
    name: "${friendly_name} Hot Water"
    id: dhw_active
    
  fault:
    name: "${friendly_name} Fault"
    id: boiler_fault
    
  diagnostic:
    name: "${friendly_name} Diagnostic"
    id: boiler_diagnostic
  
  # Temperature and other sensors
  external_temperature:
    name: "${friendly_name} External Temperature"
    id: external_temp
    
  return_temperature:
    name: "${friendly_name} Return Temperature"
    id: return_temp
    
  boiler_temperature:
    name: "${friendly_name} Boiler Temperature"
    id: boiler_temp
    
  pressure:
    name: "${friendly_name} System Pressure"
    id: system_pressure
    
  modulation:
    name: "${friendly_name} Modulation Level"
    id: modulation_level
    
  heating_target_temperature:
    name: "${friendly_name} Heating Target"
    id: heating_target
  
  # Climate controls
  hot_water_climate:
    name: "${friendly_name} Hot Water"
    id: hot_water
    
  heating_water_climate:
    name: "${friendly_name} Central Heating"
    id: central_heating

# Add buttons
button:
  - platform: restart
    name: "${friendly_name} Restart ESP"
    id: restart_button

  # Boiler reset button (BLOR command)
  - platform: opentherm
    opentherm_id: opentherm_gateway
    name: "${friendly_name} Reset Boiler"
    id: reset_boiler_button
    icon: "mdi:restart-alert"

