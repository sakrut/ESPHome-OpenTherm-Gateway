apiVersion: 1

# Datasource config do skopiowania do twojej Grafany
# Lokalizacja: /etc/grafana/provisioning/datasources/

datasources:
  - name: ESPHome Loki
    type: loki
    access: proxy
    url: http://localhost:3100  # Zmień na IP hosta Docker jeśli Grafana jest na innym serwerze
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Automatyczne linki do konkretnych msg_id
        - datasourceUid: loki
          matcherRegex: "msg_id=(\\d+)"
          name: "Message ID"
          url: "https://opentherm.iotta.co.uk/OT-2-2.html#id$${__value.raw}"
